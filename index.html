<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inspecció de Camp</title>

    <script>
        // Generem el Manifest de forma totalment dinàmica perquè Android Chrome sàpiga la URL real
        // i ens permeti instal·lar l'App en mode Pantalla Completa (Sense Barra)
        (function() {
            const currentUrl = window.location.href.split('?')[0];
            const manifestJSON = JSON.stringify({
                "name": "Inspecció de Camp",
                "short_name": "Inspecció",
                "start_url": currentUrl,
                "display": "standalone",
                "background_color": "#f3f4f6",
                "theme_color": "#2563eb",
                "icons": [
                    { "src": "https://upload.wikimedia.org/wikipedia/commons/thumb/e/ed/Map_pin_icon.svg/192px-Map_pin_icon.svg.png", "sizes": "192x192", "type": "image/png" },
                    { "src": "https://upload.wikimedia.org/wikipedia/commons/thumb/e/ed/Map_pin_icon.svg/512px-Map_pin_icon.svg.png", "sizes": "512x512", "type": "image/png" }
                ]
            });
            const link = document.createElement('link');
            link.rel = 'manifest';
            link.href = 'data:application/manifest+json;charset=utf-8,' + encodeURIComponent(manifestJSON);
            document.head.appendChild(link);
        })();
    </script>

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Inspecció">
    <meta name="theme-color" content="#2563eb">
    <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/e/ed/Map_pin_icon.svg/512px-Map_pin_icon.svg.png">
    <link rel="icon" type="image/png" sizes="512x512" href="https://upload.wikimedia.org/wikipedia/commons/thumb/e/ed/Map_pin_icon.svg/512px-Map_pin_icon.svg.png">
